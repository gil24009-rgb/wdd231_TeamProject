<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexiBridge | Study</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/study.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="LexiBridge Home">
          <span class="brand-mark" aria-hidden="true">LB</span>
          <span class="brand-text">LexiBridge</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="create.html">Deck</a>
          <a class="nav-link is-active" href="study.html">Study</a>
          <a class="nav-link" href="history.html">History</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container study">
      <section class="panel study-filter-panel" aria-label="Study filters">
        <div class="panel-row">
          <div class="field">
            <label for="studyLanguageFilter">Language</label>
            <select id="studyLanguageFilter" class="select">
              <option value="all">All</option>
              <option value="Spanish">Spanish</option>
              <option value="Korean">Korean</option>
              <option value="English">English</option>
            </select>
          </div>

          <div class="field">
            <label for="studyCategoryFilter">Category</label>
            <select id="studyCategoryFilter" class="select">
              <option value="all">All</option>
              <option value="Basics">Basics</option>
              <option value="Travel">Travel</option>
              <option value="School">School</option>
              <option value="Daily">Daily</option>
            </select>
          </div>

          <div class="field">
            <label for="studyDeckSelect">Deck</label>
            <select id="studyDeckSelect" class="select">
              <option value="">Select a deck</option>
            </select>
          </div>
        </div>
      </section>

      <section class="study-head" aria-label="Study header">
        <div>
          <h1 id="deckTitle">Study</h1>
          <p class="muted" id="deckMeta">Choose a deck to begin studying.</p>
        </div>

        <div class="study-progress-card panel" aria-label="Study progress">
          <div class="study-progress-stat">
            <span class="study-progress-label">Current card</span>
            <span class="study-progress-value" id="progressText">0 of 0</span>
          </div>
          <div class="study-progress-stat">
            <span class="study-progress-label">Known cards</span>
            <span class="study-progress-value" id="knownText">Known 0</span>
          </div>
          <div class="study-progress-stat">
            <span class="study-progress-label">Completion</span>
            <span class="study-progress-value" id="progressPercentText">0%</span>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </section>

      <section class="study-body" aria-label="Study content">
        <div class="card-wrap" id="flipWrap">
          <button
            id="flipCard"
            class="flip-card"
            type="button"
            aria-label="Flashcard. Click to flip."
          >
            <span class="flip-inner" id="flipInner">
              <span class="flip-face flip-front">
                <span class="flip-label">Term</span>
                <span class="flip-text" id="termText">...</span>
              </span>
              <span class="flip-face flip-back">
                <span class="flip-label">Meaning</span>
                <span class="flip-text" id="meaningText">...</span>
                <span class="flip-example" id="exampleText"></span>
              </span>
            </span>
          </button>

          <div class="card-actions" aria-label="Card actions">
            <button id="knownBtn" class="btn btn-primary" type="button">Known</button>
            <button id="againBtn" class="btn btn-ghost" type="button">Again</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">Choose a deck, flip the card, and continue your study flow.</p>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="js/study.js"></script>
  </body>
</html>
