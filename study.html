<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexiBridge | Study</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/study.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="LexiBridge Home">
          <span class="brand-mark" aria-hidden="true">LB</span>
          <span class="brand-text">LexiBridge</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="create.html">Create</a>
          <a class="nav-link is-active" href="study.html?deck=core-es">Study</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container study">
      <section class="study-head" aria-label="Study header">
        <div>
          <h1 id="deckTitle">Study</h1>
          <p class="muted" id="deckMeta">Loading deck...</p>
        </div>

        <div class="study-controls">
          <div class="field">
            <label for="modeSelect">Mode</label>
            <select id="modeSelect" class="select" aria-label="Study mode">
              <option value="flip">Flip</option>
              <option value="quiz">Quiz</option>
            </select>
          </div>

          <button id="shuffleBtn" class="btn btn-ghost" type="button">
            Shuffle
          </button>

          <a id="editDeckLink" class="btn btn-ghost" href="create.html">
            Edit deck
          </a>
        </div>
      </section>

      <section class="study-body" aria-label="Study content">
        <div class="card-wrap" id="flipWrap">
          <button
            id="flipCard"
            class="flip-card"
            type="button"
            aria-label="Flashcard. Click to flip."
          >
            <span class="flip-inner" id="flipInner">
              <span class="flip-face flip-front">
                <span class="flip-label">Term</span>
                <span class="flip-text" id="termText">...</span>
              </span>
              <span class="flip-face flip-back">
                <span class="flip-label">Meaning</span>
                <span class="flip-text" id="meaningText">...</span>
                <span class="flip-example" id="exampleText"></span>
              </span>
            </span>
          </button>

          <div class="card-actions" aria-label="Card actions">
            <button id="knownBtn" class="btn btn-primary" type="button">Known</button>
            <button id="againBtn" class="btn btn-ghost" type="button">Again</button>
          </div>

          <div class="progress" aria-label="Progress">
            <div class="progress-row">
              <span class="muted" id="progressText">0 of 0</span>
              <span class="muted" id="knownText">Known 0</span>
            </div>
            <div class="progress-bar" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>

        <div class="quiz-wrap" id="quizWrap" hidden>
          <div class="quiz-card">
            <div class="quiz-question">
              <span class="quiz-label">Translate</span>
              <span class="quiz-term" id="quizTerm">...</span>
            </div>

            <form id="quizForm" class="quiz-form" novalidate>
              <div class="field">
                <label for="quizAnswer">Your answer</label>
                <input
                  id="quizAnswer"
                  class="input"
                  type="text"
                  autocomplete="off"
                  required
                  minlength="1"
                />
                <p class="help" id="quizHelp">Press Enter to submit.</p>
              </div>

              <div class="quiz-actions">
                <button class="btn btn-primary" type="submit">Check</button>
                <button id="quizReveal" class="btn btn-ghost" type="button">Reveal</button>
              </div>
            </form>

           <div class="quiz-feedback" id="quizFeedback" role="alert" aria-live="assertive"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">
          Tip: Use keyboard. Tab to controls. Enter to flip or submit quiz.
        </p>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="js/study.js"></script>
  </body>
</html>
