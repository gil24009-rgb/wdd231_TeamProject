<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexiBridge | History</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/history.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="LexiBridge Home">
          <span class="brand-mark" aria-hidden="true">LB</span>
          <span class="brand-text">LexiBridge</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="create.html">Create</a>
          <a class="nav-link" href="study.html?deck=core-es">Study</a>
          <a class="nav-link is-active" href="history.html">History</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container history">
      <section class="history-head">
        <div>
          <h1>Study history</h1>
          <p class="muted">Recent activity is saved locally on this device.</p>
        </div>

        <div class="history-actions">
          <button id="exportBtn" class="btn btn-primary" type="button">Export data</button>
          <label class="btn btn-ghost" for="importFile" role="button">
            Import data
          </label>
          <input id="importFile" class="visually-hidden" type="file" accept="application/json" />
        </div>
      </section>

      <section class="panel" aria-label="History filters">
        <div class="panel-row">
          <div class="field">
            <label for="deckFilter">Deck</label>
            <select id="deckFilter" class="select">
              <option value="all">All</option>
            </select>
          </div>

          <div class="field">
            <label for="typeFilter">Type</label>
            <select id="typeFilter" class="select">
              <option value="all">All</option>
              <option value="study">Study</option>
              <option value="deck">Deck</option>
              <option value="import">Import</option>
              <option value="export">Export</option>
            </select>
          </div>

          <div class="field">
            <label for="searchFilter">Search</label>
            <input
              id="searchFilter"
              class="input"
              type="search"
              placeholder="Search by deck or message"
              autocomplete="off"
            />
          </div>
        </div>
      </section>

      <section class="panel" aria-label="History list">
        <div class="history-meta">
          <p class="muted" id="historySummary">Loading...</p>
          <button id="clearHistoryBtn" class="btn btn-danger" type="button">Clear history</button>
        </div>

        <div id="historyList" class="history-list" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">Import export includes decks, progress, streak, and history.</p>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="js/history.js"></script>
  </body>
</html>
