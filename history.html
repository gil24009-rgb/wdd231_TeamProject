<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexiBridge | History</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/history.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="LexiBridge Home">
          <span class="brand-mark" aria-hidden="true">LB</span>
          <span class="brand-text">LexiBridge</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="create.html">Deck</a>
          <a class="nav-link" href="study.html">Study</a>
          <a class="nav-link is-active" href="history.html">History</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container history">
      <section class="history-head">
        <div>
          <h1>Study history</h1>
          <p class="muted">
            Review your learning volume by language, category, and deck.
          </p>
        </div>
      </section>

      <section class="history-overview panel" aria-label="History language overview">
        <div id="historyLanguageTabs" class="history-language-tabs" aria-label="Language filters">
          <button class="btn btn-ghost language-tab is-active" type="button" data-language="English">
            English
          </button>
          <button class="btn btn-ghost language-tab" type="button" data-language="Korean">
            Korean
          </button>
          <button class="btn btn-ghost language-tab" type="button" data-language="Spanish">
            Spanish
          </button>
        </div>

        <div id="historyAccordion" class="history-accordion" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">Explore deck study volume grouped by language and category.</p>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="js/history.js"></script>
  </body>
</html>
