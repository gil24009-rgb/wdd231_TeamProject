<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexiBridge | Flashcards</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/home.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="LexiBridge Home">
          <span class="brand-mark" aria-hidden="true">LB</span>
          <span class="brand-text">LexiBridge</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link is-active" href="index.html">Home</a>
          <a class="nav-link" href="create.html">Create</a>
          <a class="nav-link" href="study.html?deck=core-es">Study</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container">
      <section class="hero">
        <div class="hero-copy">
          <h1>Build vocabulary with focused practice.</h1>
          <p class="muted">
            Create decks, study with flip cards, and keep progress with local persistence.
          </p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="create.html">Create a deck</a>
            <a class="btn btn-ghost" href="study.html?deck=core-es">Start studying</a>
          </div>
        </div>

        <div class="hero-card" role="region" aria-label="Quick stats">
          <div class="stat">
            <div class="stat-label">Decks</div>
            <div class="stat-value" id="statDecks">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Cards</div>
            <div class="stat-value" id="statCards">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="statStreak">0</div>
          </div>
        </div>
      </section>

      <section class="panel" aria-label="Deck controls">
        <div class="panel-row">
          <div class="field">
            <label for="filterLanguage">Language</label>
            <select id="filterLanguage" class="select" aria-label="Filter decks by language">
              <option value="all">All</option>
              <option value="Spanish">Spanish</option>
              <option value="Korean">Korean</option>
              <option value="English">English</option>
            </select>
          </div>

          <div class="field">
            <label for="filterCategory">Category</label>
            <select id="filterCategory" class="select" aria-label="Filter decks by category">
              <option value="all">All</option>
              <option value="Basics">Basics</option>
              <option value="Travel">Travel</option>
              <option value="School">School</option>
              <option value="Daily">Daily</option>
            </select>
          </div>

          <div class="field search-field">
            <label for="searchDecks">Search</label>
            <input
              id="searchDecks"
              class="input"
              type="search"
              placeholder="Search deck name"
              autocomplete="off"
            />
          </div>
        </div>
      </section>

      <section class="deck-grid" aria-label="Deck list">
        <div class="deck-grid-head">
          <h2>Decks</h2>
          <button class="btn btn-ghost" id="resetDemo" type="button">
            Reset demo data
          </button>
        </div>

        <div id="deckList" class="grid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">
          LexiBridge. Built for WDD 231 team project.
        </p>
        <p class="muted">
          <a href="create.html">Create</a> · <a href="study.html?deck=core-es">Study</a>
        </p>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="js/home.js"></script>
  </body>
</html>
